    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        
        // ============================================
        // CONFIGURATION - REPLACE THESE VALUES
        // ============================================
        const SUPABASE_URL = "https://atdgbsawmmfabustzxcg.supabase.co"; // REPLACE WITH YOUR URL
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0ZGdic2F3bW1mYWJ1c3R6eGNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxODgxNzcsImV4cCI6MjA4Nzc2NDE3N30.6_DOzn2BMrTHKWfrmVhge4yDdJGAJeNudbs862Jf2hs"; // REPLACE WITH YOUR ANON KEY
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: false,
            }
        });
        
        // ============================================
        // AUTH CONTEXT
        // ============================================
        const AuthContext = createContext(null);
        
        const AuthProvider = ({ children }) => {
            const [user, setUser] = useState(null);
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authChecked, setAuthChecked] = useState(false);
        
            useEffect(() => {
                const checkSession = async () => {
                    try {
                        const { data: { session }, error } = await supabase.auth.getSession();
                        if (error) throw error;
                        setSession(session);
                        setUser(session?.user ?? null);
                    } catch (err) {
                        console.error("Session error:", err);
                    } finally {
                        setLoading(false);
                        setAuthChecked(true);
                    }
                };
        
                checkSession();
        
                const { data: { subscription } } = supabase.auth.onAuthStateChange(
                    (_event, session) => {
                        setSession(session);
                        setUser(session?.user ?? null);
                        setLoading(false);
                    }
                );
        
                return () => subscription.unsubscribe();
            }, []);
        
            const signUp = async (email, password) => {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                });
                return { data, error };
            };
        
            const signIn = async (email, password) => {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password,
                });
                return { data, error };
            };
        
            const signOut = async () => {
                const { error } = await supabase.auth.signOut();
                setUser(null);
                setSession(null);
                return { error };
            };
        
            return (
                <AuthContext.Provider value={{ 
                    user, 
                    session, 
                    loading, 
                    authChecked,
                    signUp, 
                    signIn, 
                    signOut, 
                    isAuthenticated: !!user 
                }}>
                    {children}
                </AuthContext.Provider>
            );
        };
        
        const useAuth = () => {
            const context = useContext(AuthContext);
            if (!context) throw new Error('useAuth must be used within AuthProvider');
            return context;
        };
        
        // ============================================
        // ICON COMPONENT (Safe Lucide)
        // ============================================
        const Icon = ({ name, className = "", size = 24 }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {

                        iconRef.current.innerHTML = '';
                        const icon = document.createElement('i');
                        icon.setAttribute('data-lucide', name);
                        iconRef.current.appendChild(icon);
                        window.lucide.createIcons({
                            nodes: [icon],
                            attrs: { class: className, width: size, height: size }
                        });
                    } catch (e) {
                        console.warn("Icon render failed:", e);
                    }
                }
            }, [name, className, size]);
            
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };
        
        // ============================================
        // DATA
        // ============================================
        const TERMS = {

        };
        
        const INITIAL_MANIFESTOS = [
            {
                id: 1,

                avatar: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=150&h=150&fit=crop",

                endorsements: 47,

            },
            {
                id: 2,

                content: "Summoning artisans for 'Project Obsidian' — A decentralized consciousness archive stored in crystalline matrices. Reward: 5000 Essence units weekly.",
                endorsements: 128,
                echoes: [],

            }
        ];
        
        const SANCTUARY_CIRCLES = [
            { id: 1, name: "Circle of the Northern Star", location: "Nordic Regions", members: 234, regions: ["Iceland", "Norway", "Sweden", "Finland", "Denmark"] },
            { id: 2, name: "Circle of the Eastern Sun", location: "Asian Pacific", members: 189, regions: ["Japan", "China", "South Korea", "Singapore", "Thailand"] },
            { id: 3, name: "Circle of the Western Winds", location: "Americas", members: 312, regions: ["USA", "Canada", "Mexico", "Brazil", "Argentina"] },

        const ARTIFACTS = [

            { id: 2, name: "Chronicle of Rare Breeds", price: 75, image: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400&h=400&fit=crop", category: "Tome" },

            { id: 4, name: "Void Walker Attire", price: 300, image: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&h=400&fit=crop", category: "Vesture" },
        ];
        
        // ============================================
        // COMPONENTS
        // ============================================
        
        const Navbar = ({ activeTab, setActiveTab, essence }) => {

            const tabs = isAuthenticated ? [...publicTabs, ...privateTabs] : publicTabs;
            
            return (
                <nav className="fixed top-0 w-full z-50 glass-void border-b border-aurum-400/20">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-20">
                            <div 
                                className="flex items-center gap-4 cursor-pointer" 
                                onClick={() => setActiveTab('codex')}
                            >
                                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-aurum-400 via-aurum-300 to-crimson-500 flex items-center justify-center animate-pulse-glow">
                                    <Icon name="crown" className="text-void-900 w-7 h-7" />
                                </div>
                                <div>
                                    <span className="font-display font-bold text-2xl tracking-widest text-gilded">RARE BREEDS</span>
                                    <p className="text-xs text-ethereal-400 font-mono tracking-[0.3em]">THE ENLIGHTENED COLLECTIVE</p>
                                </div>
                            </div>
                            
                            {isAuthenticated && (
                                <div className="hidden lg:flex items-center gap-1">
                                    {privateTabs.map((tab) => (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300 flex items-center gap-2 ${
                                                activeTab === tab.id 
                                                ? 'bg-aurum-400/20 text-aurum-300 border border-aurum-400/50' 
                                                : 'text-ethereal-400 hover:text-aurum-200 hover:bg-white/5'

                                        >
                                            <Icon name={tab.icon} className="w-4 h-4" />
                                            <span className="hidden xl:inline">{tab.label}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
        
                            <div className="flex items-center gap-4">
                                {isAuthenticated ? (
                                    <>
                                        <div className="text-right hidden md:block">
                                            <div className="text-xs text-aurum-400 font-mono tracking-wider">ESSENCE RESERVE</div>
                                            <div className="text-lg font-display font-bold text-gilded">{essence.toLocaleString()} Æ</div>
                                        </div>
                                        <button

                                ) : (
                                    <button

                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };
        
        const Login = ({ setActiveTab }) => {
            const [isSignUp, setIsSignUp] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const { signIn, signUp } = useAuth();
        
            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
        
                try {
                    if (isSignUp) {
                        const { error } = await signUp(email, password);
                        if (error) throw error;
                        alert('Account created. Please log in.');
                        setIsSignUp(false);
                    } else {
                        const { error } = await signIn(email, password);
                        if (error) throw error;
                        setActiveTab('atrium');
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
        
            return (
                <div className="min-h-screen pt-28 pb-12 px-4 flex items-center justify-center">
                    <div className="max-w-md w-full glass-void rounded-2xl p-8 border border-aurum-400/20">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-aurum-400 to-crimson-500 flex items-center justify-center mb-4">
                                <Icon name="key" className="w-10 h-10 text-void-900" />
                            </div>
                            <h1 className="text-3xl font-display font-bold text-gilded mb-2">
                                {isSignUp ? 'Enter the Conclave' : 'Return to the Fold'}
                            </h1>
                        </div>
        
                        {error && (
                            <div className="mb-4 p-3 bg-crimson-500/20 border border-crimson-500/50 rounded-lg text-crimson-400 text-sm">
                                {error}
                            </div>
                        )}
        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-aurum-400 text-sm mb-2 font-mono tracking-wider">Email</label>

                                    required
                                    value={email}

                                    placeholder="your@email.com"
                                />
                            </div>
        
                            <div>
                                <label className="block text-aurum-400 text-sm mb-2 font-mono tracking-wider">Password</label>
                                <input
                                    type="password"
                                    required
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full bg-void-900/80 border border-aurum-400/30 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-aurum-400"
                                    placeholder="••••••••"

                            </div>
        
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full btn-gilded py-4 rounded-xl text-lg font-bold disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                            >

                                {loading ? 'Processing...' : (isSignUp ? 'Create Account' : 'Access the Conclave')}
                            </button>
                        </form>
        
                        <div className="mt-6 text-center">

                                onClick={() => setIsSignUp(!isSignUp)} 
                                className="text-ethereal-400 hover:text-aurum-400 text-sm transition-colors"

                            </button>
                        </div>
                    </div>
                </div>
            );
        };
        
        const Metamorphosis = () => {
            const [habits, setHabits] = useState({ cultivate: [], release: [] });
            const [newHabit, setNewHabit] = useState({ type: 'cultivate', text: '', reason: '' });
            const [showCeremony, setShowCeremony] = useState(false);
            const [crownedHabit, setCrownedHabit] = useState(null);
        
            useEffect(() => {
                const saved = localStorage.getItem('rarebreeds_habits');
                if (saved) setHabits(JSON.parse(saved));
            }, []);
        
            useEffect(() => {
                localStorage.setItem('rarebreeds_habits', JSON.stringify(habits));
            }, [habits]);
        
            const addHabit = (e) => {
                e.preventDefault();
                if (!newHabit.text.trim()) return;
                
                const habit = {
                    id: Date.now(),
                    text: newHabit.text,
                    reason: newHabit.reason,
                    type: newHabit.type,
                    startDate: new Date().toISOString(),
                    progress: Array(30).fill(null),
                    streak: 0,
                    completed: false
                };
                
                setHabits(prev => ({
                    ...prev,
                    [newHabit.type]: [...prev[newHabit.type], habit]
                }));
                
                setNewHabit({ type: 'cultivate', text: '', reason: '' });
            };
        
            const toggleDay = (habitId, type, dayIndex) => {
                setHabits(prev => {
                    const updated = { ...prev };
                    const habit = updated[type].find(h => h.id === habitId);
                    if (!habit || habit.completed) return prev;
                    
                    habit.progress[dayIndex] = habit.progress[dayIndex] === true ? null : true;
                    habit.streak = calculateStreak(habit.progress);
                    
                    const completedDays = habit.progress.filter(p => p === true).length;
                    if (completedDays >= 30 && !habit.completed) {
                        habit.completed = true;
                        setCrownedHabit(habit);
                        setShowCeremony(true);
                    }
                    
                    return updated;
                });
            };
        
            const markRelapse = (habitId, type, dayIndex) => {
                setHabits(prev => {
                    const updated = { ...prev };
                    const habit = updated[type].find(h => h.id === habitId);
                    if (!habit || habit.completed) return prev;
                    
                    habit.progress[dayIndex] = habit.progress[dayIndex] === false ? null : false;
                    habit.streak = calculateStreak(habit.progress);
                    return updated;
                });
            };
        
            const calculateStreak = (progress) => {
                let streak = 0;
                for (let i = 0; i < progress.length; i++) {
                    if (progress[i] === true) streak++;
                    else if (progress[i] === false) streak = 0;
                }
                return streak;
            };
        
            const getDaysSinceStart = (startDate) => {
                const start = new Date(startDate);
                const now = new Date();
                return Math.floor((now - start) / (1000 * 60 * 60 * 24));
            };
        
            const CrownCeremony = () => {
                useEffect(() => {
                    const container = document.getElementById('confetti-container');
                    if (!container) return;
                    
                    for (let i = 0; i < 50; i++) {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        confetti.style.left = Math.random() * 100 + '%';
                        confetti.style.animationDelay = Math.random() * 2 + 's';
                        confetti.style.backgroundColor = ['#d4af37', '#10b981', '#6366f1'][Math.floor(Math.random() * 3)];

    <!-- Constellation Animation -->
    <script>
        const canvas = document.getElementById('constellation');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.opacity = Math.random() * 0.8 + 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function initStars() {
            stars = [];
            for(let i = 0; i < 150; i++) stars.push(new Star());
        }
        
        function drawConnections() {
            for(let i = 0; i < stars.length; i++) {
                for(let j = i + 1; j < stars.length; j++) {
                    const dx = stars[i].x - stars[j].x;
                    const dy = stars[i].y - stars[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if(distance < 100) {
                        ctx.strokeStyle = `rgba(212, 175, 55, ${0.1 * (1 - distance/100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(stars[i].x, stars[i].y);
                        ctx.lineTo(stars[j].x, stars[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        
        function animate() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);
            stars.forEach(star => { star.update(); star.draw(); });
            drawConnections();
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => { resize(); initStars(); });
        resize();
        initStars();
        animate();
    </script>
